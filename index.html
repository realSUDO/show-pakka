<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
    >
      <div class="text-center mb-10">
        <h1
          class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight"
        >
          ChaiCode Cinema - Now Showing<br />
          <br />
          <span class="text-red-400">
            <span class="font-bold">Dhurandhar The Revenge</span>
          </span>
        </h1>
        <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"
            ></div>
            <span class="text-slate-300 font-medium tracking-wide"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-4 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <script src="src/script.js"></script>
  </body>
</html>
